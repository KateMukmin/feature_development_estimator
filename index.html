<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feature Development Estimator — FCA</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bm:#00346B;--bd:#00294F;--bl:#004A91;--b2:#66A9D9;--bs:#D4E7F5;
  --t1:#2B2A29;--t2:#727271;--t3:#B3B3B2;
  --brd:rgba(43,42,41,.10);--bri:rgba(43,42,41,.20);--fill:rgba(228,231,233,.40);
  --g:#1BB161;--gl:rgba(27,177,97,.10);--a:#F59A00;--al:rgba(245,154,0,.10);
  --r:#DF252A;--rl:rgba(223,37,42,.10);--pur:#7C3AED;--purl:rgba(124,58,237,.10);
  --sh:0 2px 12px rgba(0,52,107,.10);--shl:0 8px 32px rgba(0,52,107,.15);--rad:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#F0F4F8;color:var(--t1);min-height:100vh}
nav{background:var(--bd);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200}
.nav-l{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--bm)}
.nav-t{color:white;font-size:14px;font-weight:600}
.nav-s{color:var(--b2);font-size:12px}
.team-btn{display:flex;align-items:center;gap:6px;color:var(--b2);font-size:12px;font-weight:500;cursor:pointer;padding:6px 14px;border-radius:20px;border:1px solid rgba(102,169,217,.3);background:none;transition:all .2s}
.team-btn:hover{background:rgba(102,169,217,.12);color:white}
/* TABS */
.tab-bar{background:white;border-bottom:1px solid var(--brd);padding:0 24px;display:flex;position:sticky;top:56px;z-index:99;box-shadow:0 2px 8px rgba(0,52,107,.06)}
.tab-btn{height:46px;padding:0 20px;background:none;border:none;font-family:'Poppins',sans-serif;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;display:flex;align-items:center;gap:7px}
.tab-btn:hover{color:var(--bm)}
.tab-btn.active{color:var(--bm);font-weight:600;border-bottom-color:var(--bm)}
.tab-panel{display:none}.tab-panel.active{display:block}
/* DRAWER */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,41,79,.45);z-index:300;backdrop-filter:blur(2px)}
.overlay.on{display:block}
.drawer{position:fixed;top:0;right:-460px;width:460px;height:100vh;background:white;z-index:400;box-shadow:-8px 0 40px rgba(0,52,107,.2);transition:right .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.drawer.on{right:0}
.drw-hdr{background:var(--bm);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.drw-hdr h2{color:white;font-size:15px;font-weight:600}
.drw-x{background:rgba(255,255,255,.15);border:none;color:white;width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.drw-x:hover{background:rgba(255,255,255,.28)}
.drw-body{padding:20px;overflow-y:auto;flex:1}
.sec-t{font-size:11px;font-weight:600;color:var(--bl);text-transform:uppercase;letter-spacing:.08em;border-bottom:2px solid var(--bs);padding-bottom:8px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.sec{margin-bottom:24px}
/* INPUTS */
.inp{width:100%;height:36px;border:1px solid var(--bri);border-radius:6px;padding:0 10px;font-family:'Poppins',sans-serif;font-size:12px;color:var(--t1);background:var(--fill);appearance:none;-webkit-appearance:none;box-sizing:border-box}
.inp[type=number]{-moz-appearance:textfield;padding-right:32px}
.inp[type=number]::-webkit-outer-spin-button,.inp[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.inp:focus{outline:none;border-color:var(--bl);box-shadow:0 0 0 3px rgba(0,74,145,.12);background:white}
.inp-wrap{position:relative}
.inp-sfx{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--t3);pointer-events:none}
label{display:block;font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
/* BTNS */
.btn{height:32px;border-radius:20px;border:none;font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;cursor:pointer;padding:0 14px;display:inline-flex;align-items:center;gap:5px;transition:all .2s}
.btn-p{background:var(--bm);color:white}.btn-p:hover{background:var(--bl)}
.btn-o{background:transparent;color:var(--bm);border:1px solid var(--bm)}.btn-o:hover{background:var(--bs)}
.btn-g{background:var(--gl);color:var(--g);border:1px solid rgba(27,177,97,.3)}.btn-g:hover{background:rgba(27,177,97,.2)}
.ico{background:none;border:none;cursor:pointer;width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:background .15s,color .15s;flex-shrink:0}
.ico:hover{background:var(--rl);color:var(--r)}
.add-feat{width:100%;height:44px;background:white;border:2px dashed var(--b2);border-radius:var(--rad);color:var(--bm);font-family:'Poppins',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.add-feat:hover{background:var(--bs);border-color:var(--bm)}
/* CHIPS */
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:9px;font-weight:600;text-transform:uppercase}
.cfe{background:var(--al);color:var(--a)}.cbe{background:var(--bs);color:var(--bm)}.cqa{background:var(--gl);color:var(--g)}.cmob{background:var(--purl);color:var(--pur)}
/* ROSTER TABLE */
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.av-d{background:var(--bs);color:var(--bm)}.av-q{background:var(--gl);color:var(--g)}
.t-empty{padding:16px;text-align:center;color:var(--t3);font-size:12px}
.sp-wrap{position:relative}
.sp-sfx{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--t3);pointer-events:none}
/* FEATURE CARD */
.wrap{max-width:1340px;margin:0 auto;padding:24px}
.layout{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
.card{background:white;border-radius:var(--rad);box-shadow:var(--sh);overflow:hidden;margin-bottom:14px;border:1px solid var(--brd)}
.feat-hdr{border-bottom:1px solid var(--brd);padding:11px 14px;display:flex;align-items:center;gap:10px}
.fnum{width:24px;height:24px;background:var(--bs);color:var(--bm);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.fname{flex:1;border:none;outline:none;font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;color:var(--t1);background:transparent}
.fname::placeholder{color:var(--t3)}
.feat-body{padding:14px 16px;display:flex;flex-direction:column;gap:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.fl{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
/* TOGGLE */
.toggle-row{display:flex;align-items:center;gap:8px}
.seg{display:flex;background:var(--fill);border:1px solid var(--bri);border-radius:20px;padding:2px;gap:2px}
.seg-btn{height:26px;padding:0 12px;border:none;border-radius:18px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:var(--t2);transition:all .15s}
.seg-btn.on{background:white;color:var(--bm);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.1)}
/* PILLS */
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{display:flex;align-items:center;gap:4px;padding:4px 8px 4px 5px;border:1px solid var(--bri);border-radius:20px;background:var(--fill);cursor:pointer;font-size:11px;font-weight:500;color:var(--t2);transition:all .15s;user-select:none}
.pill:hover{border-color:var(--b2);color:var(--t1)}
.pill.sd{background:var(--bs);border-color:var(--bm);color:var(--bm)}
.pill.sq{background:var(--gl);border-color:var(--g);color:var(--g)}
.pill.sm{background:var(--purl);border-color:var(--pur);color:var(--pur)}
.pav{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;background:rgba(43,42,41,.12);color:var(--t2)}
.pill.sd .pav{background:var(--bm);color:white}
.pill.sq .pav{background:var(--g);color:white}
.pill.sm .pav{background:var(--pur);color:white}
.hint{font-size:11px;color:var(--t3);font-style:italic}
/* RESULTS */
.rp{background:var(--bd);border-radius:var(--rad);padding:18px;position:sticky;top:110px;box-shadow:var(--shl)}
.rt{color:var(--bs);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
.re{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:11px 13px;margin-bottom:9px}
.rn{color:white;font-size:12px;font-weight:600;margin-bottom:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rrow{display:flex;justify-content:space-between;padding:2px 0}
.rl{color:var(--b2);font-size:11px}.rv{color:white;font-size:11px;font-weight:500}
.rdiv{border:none;border-top:1px solid rgba(255,255,255,.08);margin:7px 0}
.rtab{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:10px;margin-bottom:6px;display:inline-block}
.rtab-sp{background:rgba(102,169,217,.2);color:var(--b2)}
.rtab-spr{background:rgba(27,177,97,.2);color:#6ee7b7}
.tot{background:var(--bm);border-radius:6px;padding:13px 15px;margin-top:12px}
.tl{color:var(--b2);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.tv{color:white;font-size:21px;font-weight:600;margin-top:2px}
.ts{color:var(--b2);font-size:11px;margin-top:2px}
.r-empty{text-align:center;padding:24px 10px;color:rgba(255,255,255,.35);font-size:12px}
.wm{margin-top:5px;padding:4px 8px;border-radius:4px;font-size:10px}
.we{background:rgba(223,37,42,.15);color:#ff6b6b}.wy{background:rgba(245,154,0,.15);color:var(--a)}
@media(max-width:1000px){.layout{grid-template-columns:1fr}.rp{position:static}.g2,.g3,.g4{grid-template-columns:1fr 1fr}.drawer{width:100%;right:-100%}}
</style>
</head>
<body>
<nav>
  <div class="nav-l">
    <div class="logo">FCA</div>
    <span class="nav-t">Feature Development Estimator</span>
    <span class="nav-s">&nbsp;/&nbsp;Field Control Analytics</span>
  </div>
  <button class="team-btn" onclick="openDrawer()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Manage Team&nbsp;<span id="tc" style="background:rgba(102,169,217,.25);border-radius:10px;padding:1px 7px;font-size:10px">0</span>
  </button>
</nav>
<div class="tab-bar">
  <button class="tab-btn active" id="tab-sp" onclick="switchTab('sp')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    By Story Points
  </button>
  <button class="tab-btn" id="tab-spr" onclick="switchTab('spr')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    By Sprints
  </button>
</div>

<!-- DRAWER -->
<div class="overlay" id="ov" onclick="closeDrawer()"></div>
<div class="drawer" id="drw">
  <div class="drw-hdr">
    <h2>Team Roster</h2>
    <button class="drw-x" onclick="closeDrawer()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
  </div>
  <div class="drw-body">
    <div class="sec">
      <div class="sec-t">
        <span>Average SP / Sprint by Track</span>
      </div>
      <p style="font-size:11px;color:var(--t3);margin-bottom:10px">Used to back-calculate story points in the By Sprints tab.</p>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
        <div>
          <label>BE</label>
          <div class="inp-wrap">
            <input type="number" id="avg-be-sp" class="inp" min="1" placeholder="e.g. 40" oninput="avgBESP=parseFloat(this.value)||0;saveData();renderAllResults()">
            <span class="inp-sfx">SP</span>
          </div>
        </div>
        <div>
          <label>FE</label>
          <div class="inp-wrap">
            <input type="number" id="avg-fe-sp" class="inp" min="1" placeholder="e.g. 30" oninput="avgFESP=parseFloat(this.value)||0;saveData();renderAllResults()">
            <span class="inp-sfx">SP</span>
          </div>
        </div>
        <div>
          <label>Mobile</label>
          <div class="inp-wrap">
            <input type="number" id="avg-mob-sp" class="inp" min="1" placeholder="e.g. 25" oninput="avgMobSP=parseFloat(this.value)||0;saveData();renderAllResults()">
            <span class="inp-sfx">SP</span>
          </div>
        </div>
      </div>
    </div>
    <div class="sec">
      <div class="sec-t">
        <span>Developers</span>
        <div style="display:flex;gap:5px">
          <button class="btn btn-o" style="height:28px;font-size:11px" onclick="addDevForm('be')">+ BE</button>
          <button class="btn btn-o" style="height:28px;font-size:11px" onclick="addDevForm('fe')">+ FE</button>
          <button class="btn" style="height:28px;font-size:11px;background:var(--purl);color:var(--pur);border:1px solid rgba(124,58,237,.3)" onclick="addDevForm('mob')">+ Mobile</button>
        </div>
      </div>
      <div id="dev-list"><div class="t-empty">No developers yet.</div></div>
    </div>
    <div class="sec">
      <div class="sec-t">
        <span>QA Engineers</span>
        <button class="btn btn-g" style="height:28px;font-size:11px" onclick="addQAForm()">+ Add QA</button>
      </div>
      <div id="qa-list"><div class="t-empty">No QA engineers yet.</div></div>
    </div>
  </div>
</div>

<!-- SP TAB -->
<div class="tab-panel active" id="panel-sp">
  <div class="wrap">
    <div class="layout">
      <div>
        <div id="sp-list"></div>
        <button class="add-feat" onclick="addFeature('sp')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
          Add Feature
        </button>
      </div>
      <div><div class="rp"><div class="rt">📊 Estimation Summary</div><div id="res-sp"></div></div></div>
    </div>
  </div>
</div>

<!-- SPRINTS TAB -->
<div class="tab-panel" id="panel-spr">
  <div class="wrap">
    <div class="layout">
      <div>
        <div id="spr-list"></div>
        <button class="add-feat" onclick="addFeature('spr')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
          Add Feature
        </button>
      </div>
      <div><div class="rp"><div class="rt">📊 Estimation Summary</div><div id="res-spr"></div></div></div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
var devs=[], qas=[], spFeatures=[], sprFeatures=[], uid=0, avgBESP=0, avgFESP=0, avgMobSP=0;
var saveTimer=null;
function debounceSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveData,600);}
function nid(){return ++uid;}
function esc(s){if(!s&&s!==0)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ini(name,fb){if(!name||!name.trim())return fb||'?';return name.trim().split(/\s+/).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);}
function fName(name,fb){if(!name||!name.trim())return fb;return name.trim().split(' ')[0];}

// ── API ────────────────────────────────────────────────────────────────────
var API='https://featuredevelopmentestimator.vercel.app/api/data-content';
async function loadData(){
  try{
    var res=await fetch(API);
    var data=await res.json();
    if(data.avgBESP){avgBESP=data.avgBESP;document.getElementById('avg-be-sp').value=avgBESP;}
    if(data.avgFESP){avgFESP=data.avgFESP;document.getElementById('avg-fe-sp').value=avgFESP;}
    if(data.avgMobSP){avgMobSP=data.avgMobSP;document.getElementById('avg-mob-sp').value=avgMobSP;}
    if(data.devs) data.devs.forEach(function(d){devs.push(d);if(d.id>=uid)uid=d.id;appendDevRow(d);});
    if(data.qas)  data.qas.forEach(function(q){qas.push(q);if(q.id>=uid)uid=q.id;appendQARow(q);});
    if(data.spFeatures) data.spFeatures.forEach(function(f){if(f.id>=uid)uid=f.id;spFeatures.push(f);appendFeatureCard(f,'sp');});
    if(data.sprFeatures) data.sprFeatures.forEach(function(f){if(f.id>=uid)uid=f.id;sprFeatures.push(f);appendFeatureCard(f,'spr');});
    syncCount();renderAllResults();
  }catch(e){console.error('Load failed',e);}
}
async function saveData(){
  try{
    await fetch(API,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({avgBESP:avgBESP,avgFESP:avgFESP,avgMobSP:avgMobSP,devs:devs,qas:qas,spFeatures:spFeatures,sprFeatures:sprFeatures})});
  }catch(e){console.error('Save failed',e);}
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(t){
  ['sp','spr'].forEach(function(x){
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
    document.getElementById('panel-'+x).classList.toggle('active',x===t);
  });
}

// ── Drawer ─────────────────────────────────────────────────────────────────
function openDrawer(){document.getElementById('drw').classList.add('on');document.getElementById('ov').classList.add('on');}
function closeDrawer(){document.getElementById('drw').classList.remove('on');document.getElementById('ov').classList.remove('on');}
function syncCount(){document.getElementById('tc').textContent=devs.length+qas.length;}

// ── Dev roster ─────────────────────────────────────────────────────────────
function addDevForm(type){
  var list=document.getElementById('dev-list');
  var empty=list.querySelector('.t-empty');if(empty)empty.remove();
  var form=document.createElement('div');
  form.dataset.pending='1';form.dataset.devtype=type;
  form.style.cssText='display:grid;grid-template-columns:28px 1fr 90px 30px;gap:8px;align-items:center;padding:7px 4px;border-bottom:1px solid var(--brd);background:rgba(0,52,107,.03)';
  var av=document.createElement('div');av.className='av av-d';av.textContent=type.toUpperCase();
  var ni=document.createElement('input');ni.type='text';ni.placeholder='First and last name';
  ni.style.cssText='height:32px;border:1px solid var(--bri);border-radius:6px;padding:0 9px;font-family:Poppins,sans-serif;font-size:12px;color:var(--t1);background:var(--fill);width:100%;box-sizing:border-box';
  ni.addEventListener('focus',function(){this.style.borderColor='var(--bl)';this.style.boxShadow='0 0 0 3px rgba(0,74,145,.12)';this.style.background='white';});
  ni.addEventListener('blur',function(){this.style.borderColor='var(--bri)';this.style.boxShadow='none';this.style.background='var(--fill)';});
  ni.addEventListener('input',function(){av.textContent=ini(this.value,type.toUpperCase());});
  var spw=document.createElement('div');spw.style.position='relative';
  var si=document.createElement('input');si.type='number';si.min=1;si.max=200;si.value=20;
  si.style.cssText='height:32px;border:1px solid var(--bri);border-radius:6px;padding:0 28px 0 9px;font-family:Poppins,sans-serif;font-size:12px;color:var(--t1);background:var(--fill);width:100%;box-sizing:border-box;-moz-appearance:textfield';
  si.addEventListener('focus',function(){this.style.borderColor='var(--bl)';this.style.boxShadow='0 0 0 3px rgba(0,74,145,.12)';this.style.background='white';});
  si.addEventListener('blur',function(){this.style.borderColor='var(--bri)';this.style.boxShadow='none';this.style.background='var(--fill)';});
  var ss=document.createElement('span');ss.className='sp-sfx';ss.textContent='SP';
  spw.appendChild(si);spw.appendChild(ss);
  var del=document.createElement('button');del.className='ico';
  del.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>';

function toggleAssign(f,mid,role,pillEl,type){
  var arr=role==='d'?f.dids:f.qids;
  var idx=arr.indexOf(mid);
  var cls=type==='fe'?'sd':type==='mob'?'sm':role==='q'?'sq':'sd';
  if(idx===-1){
    arr.push(mid);pillEl.classList.add(cls);
    pillEl.querySelector('.pav').style.background=type==='mob'?'var(--pur)':role==='q'?'var(--g)':'var(--bm)';
    pillEl.querySelector('.pav').style.color='white';

    arr.splice(idx,1);pillEl.classList.remove(cls);
    pillEl.querySelector('.pav').style.background='';pillEl.querySelector('.pav').style.color='';
  }
  renderAllResults();saveData();
}

function refreshPills(){

// ── Calculation ────────────────────────────────────────────────────────────
function calcSP(f){
  var beSP=parseFloat(f.beSP)||0;
  var feSP=parseFloat(f.feSP)||0;
  var mobSP=parseFloat(f.mobSP)||0;
  if(!beSP&&!feSP&&!mobSP)return null;
  var aBE=devs.filter(function(d){return d.type==='be'&&f.dids.indexOf(d.id)!==-1;});
  var aFE=devs.filter(function(d){return d.type==='fe'&&f.dids.indexOf(d.id)!==-1;});
  var aMOB=devs.filter(function(d){return d.type==='mob'&&f.dids.indexOf(d.id)!==-1;});
  var tracks=[];
  if(beSP>0){var beOut=aBE.reduce(function(s,d){return s+(d.spOutput||0);},0);if(beOut>0)tracks.push({name:'BE',spr:beSP/beOut,sp:beSP});}
  if(feSP>0){var feOut=aFE.reduce(function(s,d){return s+(d.spOutput||0);},0);if(feOut>0)tracks.push({name:'FE',spr:feSP/feOut,sp:feSP});}
  if(mobSP>0){var mobOut=aMOB.reduce(function(s,d){return s+(d.spOutput||0);},0);if(mobOut>0)tracks.push({name:'MOB',spr:mobSP/mobOut,sp:mobSP});}
  if(!tracks.length)return null;
  var devTime=f.mode==='parallel'?Math.max.apply(null,tracks.map(function(t){return t.spr;})):tracks.reduce(function(s,t){return s+t.spr;},0);
  var qa=parseFloat(f.qaSpr)||0;
  var buf=parseFloat(f.buffer)||0;
  var total=devTime+qa;
  var totalBuf=total*(1+buf/100);
  var totalSP=beSP+feSP+mobSP;
  return{devTime:devTime,qa:qa,total:total,totalBuf:totalBuf,sp:totalSP,days:Math.round(total*14),daysBuf:Math.round(totalBuf*14),tracks:tracks};
}

function calcSPR(f){
  var be=parseFloat(f.beSpr)||0;
  var fe=parseFloat(f.feSpr)||0;
  var mob=parseFloat(f.mobSpr)||0;
  if(!be&&!fe&&!mob)return null;
  var aBE=devs.filter(function(d){return d.type==='be'&&f.dids.indexOf(d.id)!==-1;});
  var aFE=devs.filter(function(d){return d.type==='fe'&&f.dids.indexOf(d.id)!==-1;});
  var aMOB=devs.filter(function(d){return d.type==='mob'&&f.dids.indexOf(d.id)!==-1;});
  var tracks=[];
  if(be>0){var cnt=Math.max(aBE.length,1);tracks.push({name:'BE',spr:be/cnt});}
  if(fe>0){var cnt=Math.max(aFE.length,1);tracks.push({name:'FE',spr:fe/cnt});}
  if(mob>0){var cnt=Math.max(aMOB.length,1);tracks.push({name:'MOB',spr:mob/cnt});}
  var devTime=f.mode==='parallel'?Math.max.apply(null,tracks.map(function(t){return t.spr;})):tracks.reduce(function(s,t){return s+t.spr;},0);
  var qa=parseFloat(f.qaSpr)||0;
  var buf=parseFloat(f.buffer)||0;
  var total=devTime+qa;
  var totalBuf=total*(1+buf/100);
  // back-calculate SP per track using track-specific averages
  var spTotal=0;var hasAvg=false;
  if(be>0&&avgBESP>0){spTotal+=be/Math.max(aBE.length,1)*avgBESP;hasAvg=true;}
  if(fe>0&&avgFESP>0){spTotal+=fe/Math.max(aFE.length,1)*avgFESP;hasAvg=true;}
  if(mob>0&&avgMobSP>0){spTotal+=mob/Math.max(aMOB.length,1)*avgMobSP;hasAvg=true;}
  var sp=hasAvg?spTotal:null;
  return{devTime:devTime,qa:qa,total:total,totalBuf:totalBuf,sp:sp,days:Math.round(total*14),daysBuf:Math.round(totalBuf*14),tracks:tracks};
}

function renderAllResults(){renderResults('sp');renderResults('spr');}

function renderResults(tab){
  var el=document.getElementById('res-'+tab);
  var arr=tab==='sp'?spFeatures:sprFeatures;
  if(arr.length===0){el.innerHTML='<div class="r-empty">📋<br>Add features to see estimates</div>';return;}
  var html='',gSpr=0,gDays=0;
  var arr=tab==='sp'?spFeatures:sprFeatures;
  arr.forEach(function(f,i){
    var r=tab==='sp'?calcSP(f):calcSPR(f);
    var name=(f.name&&f.name.trim())?f.name:'Feature '+(i+1);
    html+='<div class="re"><div class="rn">'+esc(name)+'</div>';
    if(!r){
      var msg=tab==='sp'?'Enter SP and assign developers':'Enter sprints';
      html+='<div style="color:rgba(255,255,255,.3);font-size:11px">'+msg+'</div>';
    } else {
      gSpr+=r.totalBuf;gDays+=r.daysBuf;
      r.tracks.forEach(function(t){
        html+='<div class="rrow"><span class="rl">'+t.name+' Dev</span><span class="rv">'+t.spr.toFixed(1)+' spr</span></div>';
      });
      html+='<div class="rrow"><span class="rl">QA</span><span class="rv">'+(r.qa?r.qa+' spr':'—')+'</span></div>';
      html+='<hr class="rdiv">';
      html+='<div class="rrow"><span class="rl">Dev Time</span><span class="rv">'+r.devTime.toFixed(1)+' spr</span></div>';
      html+='<div class="rrow"><span class="rl">Total</span><span class="rv" style="color:#66A9D9;font-weight:600">'+r.total.toFixed(1)+' spr</span></div>';
      if(r.sp)html+='<div class="rrow"><span class="rl">Story Points</span><span class="rv">~'+Math.round(r.sp)+' SP</span></div>';
      if(f.buffer>0)html+='<div class="rrow"><span class="rl">With '+f.buffer+'% buffer</span><span class="rv" style="color:#fcd34d;font-weight:600">'+r.totalBuf.toFixed(1)+' spr</span></div>';
      html+='<div class="rrow"><span class="rl">Calendar Days</span><span class="rv">~'+r.daysBuf+' days</span></div>';
      if(!f.qids.length)html+='<div class="wm we">⚠ No QA assigned</div>';
      if(!f.qaSpr)html+='<div class="wm wy">⚠ No QA time set</div>';
    }
    html+='</div>';
  });
  if(gSpr>0)html+='<div class="tot"><div class="tl">Total Estimate</div><div class="tv">'+gSpr.toFixed(1)+' sprints</div><div class="ts">~'+gDays+' days · '+(gDays/30).toFixed(1)+' months</div></div>';
  el.innerHTML=html;
}

// ── Init ───────────────────────────────────────────────────────────────────
['sp-list','spr-list'].forEach(function(listId){
  document.getElementById(listId).innerHTML='<div class="feat-empty" style="text-align:center;padding:40px 0;color:var(--t3);font-size:13px">No features yet — add one below.</div>';
});
loadData();
